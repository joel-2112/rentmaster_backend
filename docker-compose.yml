# docker-compose.yml
version: '3.8'

services:
  # ሬዲስ (Redis)
  redis:
    image: redis:7-alpine
    container_name: rent_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - rent_network

  # ፖስትግረስ (PostgreSQL) - አማራጭ (ሎካል ካለን አያስፈልግም)
  postgres:
    image: postgres:17-alpine
    container_name: rent_postgres
    environment:
      POSTGRES_DB: rent_db
      POSTGRES_USER: rent_user
      POSTGRES_PASSWORD: 1q0p2w9o
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rent_network

  # ካፍካ (Kafka) - ለአሁን አያስፈልግም በኋላ እንጨምራለን

networks:
  rent_network:
    driver: bridge

volumes:
  redis_data:
  postgres_data: